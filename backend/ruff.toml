# Ruff configuration for the Petone backend.
# Docs: https://docs.astral.sh/ruff/
target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import ordering)
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
"app/seed.py" = ["E501"]  # long demo image URLs and Persian descriptions
